apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-go-service
  labels:
    app: sentinel-go-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-go-service
  template:
    metadata:
      labels:
        app: sentinel-go-service
    spec:
      containers:
        - name: go-service
          image: sentinel-device-manager/go-service:latest
          ports:
            - containerPort: 8080
              name: rest
            - containerPort: 9090
              name: grpc
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: DYNAMO_DEVICES_TABLE
              value: "sentinel-devices"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: go-service
spec:
  selector:
    app: sentinel-go-service
  ports:
    - name: rest
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-go-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel-go-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
