apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-python-service
  labels:
    app: sentinel-python-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-python-service
  template:
    metadata:
      labels:
        app: sentinel-python-service
    spec:
      containers:
        - name: python-service
          image: sentinel-device-manager/python-service:latest
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: python-service
spec:
  selector:
    app: sentinel-python-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
