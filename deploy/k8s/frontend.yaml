apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-frontend
  labels:
    app: sentinel-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-frontend
  template:
    metadata:
      labels:
        app: sentinel-frontend
    spec:
      containers:
        - name: frontend
          image: sentinel-device-manager/frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: sentinel-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: sentinel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api/v1/devices
            pathType: Prefix
            backend:
              service:
                name: go-service
                port:
                  number: 8080
          - path: /api/v1/events
            pathType: Prefix
            backend:
              service:
                name: python-service
                port:
                  number: 8081
          - path: /api/v1/alerts
            pathType: Prefix
            backend:
              service:
                name: python-service
                port:
                  number: 8081
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: python-service
                port:
                  number: 8081
