version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosec
  settings:
    gosec:
      excludes:
        - G104
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - (io.Writer).Write
        - (net/http.ResponseWriter).Write
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - path: pkg/api/
        linters:
          - all
