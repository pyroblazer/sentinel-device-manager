services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -inMemory"

  init-dynamodb:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    volumes:
      - ./scripts/init-dynamodb.sh:/init-dynamodb.sh:ro
    entrypoint: ["/bin/sh", "/init-dynamodb.sh"]

  go-service:
    build:
      context: ./backend/go
      dockerfile: ../../deploy/docker/Dockerfile.go
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMO_DEVICES_TABLE=sentinel-devices
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - REST_PORT=8080
      - GRPC_PORT=9090
      - JWT_SECRET_KEY=change-me-in-production
      - AUTH_ENABLED=false
      - APP_VERSION=1.0.0
      - CORS_ALLOWED_ORIGINS=*
      - OTEL_EXPORTER_OTLP_ENDPOINT=none
    depends_on:
      init-dynamodb:
        condition: service_completed_successfully

  python-service:
    build:
      context: ./backend/python
      dockerfile: ../../deploy/docker/Dockerfile.python
    ports:
      - "8081:8081"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=none
    depends_on:
      init-dynamodb:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - go-service
      - python-service

  firmware-sim:
    build:
      context: ./firmware
      dockerfile: ../deploy/docker/Dockerfile.firmware
    environment:
      - DEVICE_SERIAL=VKD-CAM-SIM-001
      - DEVICE_MAC=AA:BB:CC:DD:EE:FF
      - DEVICE_MODEL=D30-SIM
      - API_URL=http://go-service:8080
      - ANALYTICS_URL=http://python-service:8081
    depends_on:
      - go-service

  firmware-sim-2:
    build:
      context: ./firmware
      dockerfile: ../deploy/docker/Dockerfile.firmware
    environment:
      - DEVICE_SERIAL=VKD-SENSOR-SIM-002
      - DEVICE_MAC=11:22:33:44:55:66
      - DEVICE_MODEL=S10-SIM
      - API_URL=http://go-service:8080
      - ANALYTICS_URL=http://python-service:8081
    depends_on:
      - go-service
