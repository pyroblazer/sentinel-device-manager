input {
  beats {
    port => 5044
  }
  http {
    port => 8089
    codec => json
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  if [parsed][correlation_id] {
    mutate {
      add_field => { "correlation_id" => "%{[parsed][correlation_id]}" }
    }
  }

  if [parsed][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{[parsed][trace_id]}" }
    }
  }

  if [parsed][level] {
    mutate {
      add_field => { "log_level" => "%{[parsed][level]}" }
    }
  }

  if [parsed][service] {
    mutate {
      add_field => { "service_name" => "%{[parsed][service]}" }
    }
  }

  mutate {
    remove_field => ["message", "parsed"]
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "sentinel-logs-%{+YYYY.MM.dd}"
  }
}
