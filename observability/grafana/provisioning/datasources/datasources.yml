apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'

  - name: Elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: 'sentinel-logs-*'
    jsonData:
      esVersion: '8.13.0'
      timeField: '@timestamp'
      logMessageField: message
      logLevelField: log_level
    editable: false
