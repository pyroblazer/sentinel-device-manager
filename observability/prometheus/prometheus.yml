global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'sentinel-go'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['go-service:8080']
        labels:
          service: 'sentinel-go'
          env: 'production'

  - job_name: 'sentinel-python'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['python-service:8081']
        labels:
          service: 'sentinel-python'
          env: 'production'

  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
